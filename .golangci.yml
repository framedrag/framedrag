# golangci-lint configuration for framedrag.
# Adapted from higgs's config. Conservative defaults; only enables
# broadly-agreed-upon linters. Unlike higgs, gofmt/goimports are enabled
# from day one: this tree started clean, keep it that way.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
    - gosec
    - misspell

  settings:
    errcheck:
      # Ignoring the error from these is idiomatic: Close on read paths /
      # defer cleanup, and Fprint* to in-process buffers/stderr. Real write
      # errors are surfaced where they matter (explicit flush/commit paths,
      # e.g. the file target's atomic write).
      exclude-functions:
        - (*os.File).Close
        - (io.ReadCloser).Close
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      severity: warning
      rules:
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
    gosec:
      # Excludes (tune as the codebase evolves):
      #   G104 — unhandled errors; errcheck is the canonical linter for this
      #          and already governs the policy (see errcheck.exclude-functions).
      #   G304 — file inclusion from variable; framedrag reads config, state,
      #          and cached feed files from user-configured paths by design.
      excludes:
        - G104
        - G304

  exclusions:
    rules:
      # Test code is not a production security surface: it opens fixture
      # files from variables, builds paths from test data, and intentionally
      # ignores helper return values (t.Cleanup, etc.).
      - path: _test\.go
        linters:
          - gosec
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - framedrag.dev/framedrag

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
