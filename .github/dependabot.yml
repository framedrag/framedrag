# Dependabot configuration: weekly updates for Go modules and GitHub Actions.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      # codeql-action init/analyze must move in lockstep: mismatched
      # versions fail the analyze step, so split PRs can never go green.
      github-actions:
        patterns:
          - "*"
