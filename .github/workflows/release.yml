# Release workflow: on a semver tag push (vX.Y.Z), runs GoReleaser to build
# multi-arch binaries (linux/darwin/freebsd), generate SBOMs, cosign-sign the
# checksums file (keyless via OIDC), and publish a GitHub Release.
#
# Only the ambient GITHUB_TOKEN is used: `contents: write` to publish the
# release, `id-token: write` for cosign keyless signing. No personal access
# tokens (org rule); if a step ever needs cross-repo write access, use a
# GitHub App via actions/create-github-app-token.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
