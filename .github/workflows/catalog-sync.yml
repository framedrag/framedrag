# Weekly catalog sync: diff the vendored pfBlockerNG feed catalog
# against upstream and open an issue when they diverge. This is how
# framedrag inherits upstream's ongoing curation (SPEC section 4).
#
# Setup required (org rule: NO personal access tokens, ever):
#   A GitHub App with "Issues: write" permission, installed on this
#   repository only. Store its App ID as the repo/org variable
#   CATALOG_SYNC_APP_ID and its private key as the secret
#   CATALOG_SYNC_APP_PRIVATE_KEY. The workflow mints a short-lived
#   installation token from it at run time; no long-lived credential
#   ever exists.

name: catalog-sync

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: https://raw.githubusercontent.com/pfBlockerNG/pfBlockerNG/devel/src/usr/local/www/pfblockerng/pfblockerng_feeds.json
      ISSUE_TITLE: "catalog: upstream feeds.json has diverged from the vendored copy"
    steps:
      - uses: actions/checkout@v7

      - name: Fetch upstream catalog
        run: |
          curl --fail --silent --show-error --location \
            --output /tmp/upstream-feeds.json \
            "$UPSTREAM_URL"

      - name: Diff against vendored copy
        id: diff
        run: |
          if diff -u catalog/feeds.json /tmp/upstream-feeds.json > /tmp/feeds.diff; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Vendored catalog matches upstream."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Catalog has diverged ($(wc -l < /tmp/feeds.diff) diff lines)."
          fi

      # Short-lived installation token from the GitHub App described in
      # the header comment. Never a PAT.
      - name: Mint GitHub App token
        if: steps.diff.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CATALOG_SYNC_APP_ID }}
          private-key: ${{ secrets.CATALOG_SYNC_APP_PRIVATE_KEY }}

      - name: Open issue (unless one is already open)
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Duplicate guard: exact-title match among open issues.
          existing=$(gh issue list --state open \
            --search "\"$ISSUE_TITLE\" in:title" \
            --json title --jq \
            "[.[] | select(.title == \"$ISSUE_TITLE\")] | length")
          if [ "$existing" -gt 0 ]; then
            echo "An open catalog-sync issue already exists; not filing another."
            exit 0
          fi

          upstream_sha=$(curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/pfBlockerNG/pfBlockerNG/commits?path=src/usr/local/www/pfblockerng/pfblockerng_feeds.json&sha=devel&per_page=1" \
            | jq -r '.[0].sha // "unknown"')

          {
            echo "The weekly catalog sync found that upstream \`pfblockerng_feeds.json\` no longer matches \`catalog/feeds.json\`."
            echo
            echo "- Upstream: \`github.com/pfBlockerNG/pfBlockerNG\` branch \`devel\`, latest commit touching the file: \`$upstream_sha\`"
            echo "- Vendored provenance: \`catalog/UPSTREAM\`"
            echo
            echo "Review the diff, then re-vendor and update \`catalog/UPSTREAM\` (commit SHA + fetch date)."
            echo
            echo "<details><summary>diff -u catalog/feeds.json upstream (truncated to 400 lines)</summary>"
            echo
            echo '```diff'
            head -n 400 /tmp/feeds.diff
            echo '```'
            echo
            echo "</details>"
          } > /tmp/issue-body.md

          gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file /tmp/issue-body.md
